<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>demo_todo</title>
    <link rel="stylesheet" href="public/style.css">
</head>
<body class="m-4">

    <h1 class="text-2xl font-bold">List of tasks todo</h1>

    <table class="table-auto w-full mb-4">
        <thead>
            <tr>
                <th class="px-4 py-2">Title</th>
                <th class="px-4 py-2">Status</th>
                <th class="px-4 py-2">Created At</th>
                <th class="px-4 py-2">Completed At</th>
            </tr>
        </thead>
        <tbody>
            {{ range . }}
            <tr>
                <td class="border px-4 py-2">{{ .Title }}</td>
                <td class="border px-4 py-2">{{ if .Completed }}Completed{{ else }}Pending{{ end }}</td>
                <td class="border px-4 py-2">{{ .CreatedAt.Format "2006-01-02 15:04"}}</td>
                <td class="border px-4 py-2">{{ if .CompletedAt }}{{ .CompletedAt.Format "2006-01-02 15:04" }}{{ end }}</td>
            </tr>
            {{ end }}
        </tbody>
    </table>

</body>
</html>
